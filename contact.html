<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>StackHaus - Contact</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
primary:"#e67e22",
soft:"#f5f3ef"
},
fontFamily:{
display:["Inter","sans-serif"]
},
borderRadius:{
lg:"12px",
xl:"18px"
}
}
}
}
</script>

<style>

input, textarea{
background:#ffffff;
border:1px solid #e5e5e5;
color:#333;
font-family:'Inter', sans-serif;
border-radius:8px;
}

input:focus, textarea:focus{
outline:none;
border-color:#e67e22;
box-shadow:0 0 0 2px rgba(230,126,34,0.15);
}

</style>

</head>



<body class="bg-white text-gray-800 font-display min-h-screen flex flex-col">

<div class="flex flex-col min-h-screen w-full max-w-[1440px] mx-auto">

<!-- HEADER -->

<header class="flex items-center justify-between px-6 py-5 border-b bg-white sticky top-0 z-50">

<div class="flex items-center gap-3">

<span class="material-symbols-outlined text-primary text-xl">
grid_view
</span>

<a href="index.html"
class="text-m font-semibold tracking-wide">

StackHaus

</a>

</div>


<nav class="hidden md:flex items-center gap-12">

<a class="text-s font-semibold text-gray-600 hover:text-primary"
href="manifesto.html">ABOUT</a>

<a class="text-s font-semibold text-gray-600 hover:text-primary"
href="case-studies.html">GALLERY</a>

<a class="text-s font-semibold text-primary"
href="contact.html">CONTACT</a>

</nav>

<a href="login.html"
class="bg-primary text-white text-sm px-5 py-2 rounded-lg hover:opacity-90 transition">

Access Portal

</a>

</header>



<!-- MAIN -->

<main class="flex-grow flex flex-col items-center justify-center px-6 md:px-12 py-12">

<div class="max-w-2xl w-full">

<div class="flex items-center justify-between mb-8 border-b border-gray-200 pb-4">

<h1 class="text-3xl font-bold text-gray-900">

Contact Us

</h1>

<div class="flex items-center gap-2 text-xs uppercase tracking-wide text-gray-400">

<span class="material-symbols-outlined text-sm">
mail
</span>

StackHaus Support

</div>

</div>



<form class="space-y-6">

<div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<div>

<label class="block text-xs uppercase tracking-wide text-gray-500 mb-2">

Name

</label>

<input type="text"
class="w-full p-3 text-sm"
placeholder="Your name">

</div>



<div>

<label class="block text-xs uppercase tracking-wide text-gray-500 mb-2">

Location

</label>

<input type="text"
class="w-full p-3 text-sm"
placeholder="City, Country">

</div>

</div>



<div>

<label class="block text-xs uppercase tracking-wide text-gray-500 mb-2">

Message

</label>

<textarea rows="6"
class="w-full p-3 text-sm"
placeholder="Tell us about your shelving project..."></textarea>

</div>



<div class="flex items-center justify-between pt-4">

<div class="text-xs text-gray-400">

Response time: 24–48 hours

</div>

<button type="button"
class="bg-primary text-white font-semibold uppercase text-xs tracking-wide py-3 px-8 rounded-lg hover:opacity-90 transition flex items-center gap-2 group">

Send Message

<span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">

send

</span>

</button>

</div>

</form>

</div>

</main>



<!-- FOOTER -->

<footer class="border-t px-6 py-4 text-xs text-gray-500 flex justify-between items-end">

<div class="flex flex-col gap-1">

<span>© 2024 StackHaus</span>
<span>Customer Support Portal</span>

</div>

<div class="text-right hidden sm:block">

<div>Mem: 99TB / 128TB</div>
<div>CPU: 5% Load</div>

</div>

</footer>

</div>

</body>

</html>
