<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StackHaus - Simulation</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com"></script>

<script>
tailwind.config = {
theme:{
extend:{
colors:{
primary:"#e67e22",
soft:"#f5f3ef",
background:"#ffffff",
accent:"#e67e22"
},
fontFamily:{
display:["Inter","sans-serif"]
},
borderRadius:{
lg:"12px",
xl:"18px"
}
}
}
}
</script>

<style>
/* Scrollbars */
aside::-webkit-scrollbar{width:6px;}
aside::-webkit-scrollbar-track{background:#f5f5f5;}
aside::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}

/* Chat bubbles */
.chat-bubble{position:relative;}
.chat-bubble::before{
content:'';position:absolute;top:0;left:-4px;width:2px;height:100%;background:#e67e22;
}

.chat-message-system{
background:#f5f3ef;border:1px solid #e0dcd5;border-radius:0 12px 12px 0;padding:0.75rem;
}

.chat-message-operator{
background:#e67e22/10;border:1px solid #e67e22/30;border-radius:12px 12px 0 0;padding:0.75rem;text-align:right;
}

.chat-input-wrapper{
border:1px solid #ccc;border-radius:12px;padding:0.5rem;transition:border-color 0.2s,box-shadow 0.2s;
}
.chat-input-wrapper:focus-within{
border-color:#e67e22;box-shadow:0 0 5px rgba(230,126,34,0.3);
}
</style>
</head>

<body class="bg-background text-gray-800 font-display min-h-screen flex overflow-hidden">

<!-- Left Sidebar: System Parameters -->
<aside class="w-80 border-r border-gray-200 bg-soft flex flex-col z-20 relative h-full rounded-xl p-6">
<header class="mb-4">
<h1 class="font-bold tracking-wide text-xl text-gray-900">System Parameters</h1>
</header>
<!-- Example content -->
<div class="space-y-3 text-gray-700 text-sm">
<div>Occupancy: <span id="sel-occupancy">4,250</span></div>
<div>Function: <span id="sel-function">Mixed Use / Comm.</span></div>
<div>Duration: <span id="sel-duration">12h 40m</span></div>
<div>Energy: <span id="sel-energy">Passive Solar</span></div>
</div>
</aside>

<!-- Center Viewport -->
<main class="flex-grow relative flex flex-col z-10 p-6">

<!-- Top bar -->
<div class="flex items-center justify-between mb-6 bg-soft border border-gray-200 rounded-xl px-4 py-3">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-xl">grid_view</span>
<a href="index.html" class="text-lg font-semibold tracking-wide text-gray-900 hover:text-primary">StackHaus</a>
</div>
<div class="flex items-center gap-4 text-xs text-gray-600">
</div>
</div>

<!-- Simulation viewport -->
<div class="relative w-full flex-grow bg-soft border border-gray-200 rounded-xl flex items-center justify-center">
<!-- Background grid -->
<div class="absolute inset-0 bg-grid opacity-10 pointer-events-none"></div>
<!-- Structure -->
<div class="relative w-[500px] h-[500px] bg-white/20 border border-gray-200 rounded-xl flex items-center justify-center">
<div class="absolute inset-0 bg-no-repeat bg-contain bg-center" style="background-image: url('images/structure.png'); filter: contrast(1.2);"></div>
</div>

</div>
</main>

<!-- Right Sidebar: Config Assistant -->
<aside class="w-80 border-l border-gray-200 bg-soft flex flex-col z-20 relative h-full rounded-xl">
<header class="p-4 border-b border-gray-200 flex items-center gap-3">
<div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center border border-primary/30">
<span class="material-symbols-outlined text-primary text-base">smart_toy</span>
</div>
<div>
<div class="text-gray-900 font-bold uppercase text-xs tracking-wide">StackHaus Agent</div>
<div class="text-gray-500 text-[9px] uppercase tracking-widest mt-0.5">AI · Online</div>
</div>
</header>

<div class="flex-grow p-20 overflow-y-auto space-y-4 text-xs font-mono" id="chatHistory">
<!-- Chat messages populated by script -->
</div>

<div class="p-4 border-t border-gray-200">
<div class="relative chat-input-wrapper">
<input id="chatInput" type="text" placeholder="Ask me to run the simulation or suggest a change..."
class="w-full bg-transparent pl-2 pr-10 py-2 text-xs text-gray-900 focus:outline-none placeholder-gray-400" />
<button id="sendBtn" class="absolute right-2 top-2 text-primary hover:text-primary/80" title="Send">
<span class="material-symbols-outlined text-sm">send</span>
</button>
</div>
<div class="flex justify-between mt-2 text-[9px] uppercase tracking-widest">
<span class="text-gray-500">Mode: Interactive</span>
<span class="text-primary">Connected</span>
</div>
</div>
</aside>

<script>
document.addEventListener('DOMContentLoaded', function () {
const occupancy = sessionStorage.getItem('occupancy') || '4,250';
const func = sessionStorage.getItem('function') || 'Mixed Use / Comm.';
const duration = sessionStorage.getItem('duration') || '12h 40m';
const energy = sessionStorage.getItem('energy') || 'Passive Solar';

document.getElementById('sel-occupancy').textContent = occupancy;
document.getElementById('sel-function').textContent = func;
document.getElementById('sel-duration').textContent = duration;
document.getElementById('sel-energy').textContent = energy;

// Chat send wiring
const input = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const chatHistory = document.getElementById('chatHistory');

function appendOperatorMessage(text) {
const wrapper = document.createElement('div');
wrapper.className = 'flex flex-col items-end';
wrapper.innerHTML = `
<div class="flex justify-between w-full text-[9px] text-gray-600 mb-1 uppercase tracking-widest">
<span>${new Date().toLocaleTimeString()}</span>
<span class="text-accent font-bold">OPERATOR</span>
</div>
<div class="chat-message-operator w-full max-w-[95%]">${escapeHtml(text)}</div>
`;
chatHistory.appendChild(wrapper);
chatHistory.scrollTop = chatHistory.scrollHeight;
}

function appendSystemMessage(text) {
const node = document.createElement('div');
node.className = 'chat-bubble chat-message-system';
node.innerHTML = `
<div class="flex justify-between text-[9px] text-primary/50 mb-2 uppercase tracking-widest">
<span class="text-primary font-bold">STACKHAUS AGENT</span>
<span>${new Date().toLocaleTimeString()}</span>
</div>
<div class="text-gray-700 leading-relaxed">${escapeHtml(text)}</div>
`;
chatHistory.appendChild(node);
chatHistory.scrollTop = chatHistory.scrollHeight;
}

function escapeHtml(unsafe) {
return unsafe.replace(/[&<>"']/g, function (m) { return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[m]; });
}

sendBtn.addEventListener('click', function () {
const val = input.value.trim(); if(!val) return;
appendOperatorMessage(val); input.value='';
setTimeout(()=>{appendSystemMessage('Acknowledged. Running "'+val+'". I will report results shortly.');},600);
});

input.addEventListener('keydown', function(e){if(e.key==='Enter'){sendBtn.click();}});
});

</script>

<script type="module" src="/main.js"></script>
</html>
